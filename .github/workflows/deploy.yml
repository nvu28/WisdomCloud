name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            backend-mock/package-lock.json
            frontend/package-lock.json

      - name: Install & test backend
        run: |
          cd backend-mock
          npm ci
          node server.js &
          sleep 2
          curl -s "http://localhost:8080/api/v1/products/search?q=iphone&size=1" | grep -q "iPhone"
          echo "Backend API test passed"

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Deploy to Render
        if: github.ref == 'refs/heads/main'
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -X POST "$RENDER_DEPLOY_HOOK"
            echo "Triggered Render deploy"
          else
            echo "RENDER_DEPLOY_HOOK not set - skipping deploy"
          fi
